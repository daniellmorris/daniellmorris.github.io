# The URL the site will be built for
base_url = "https://daniellmorris.github.io"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

theme = "hayflow"

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

[extra]
name = { first = "Dan", last = "Morris" }

links = [
   { icon = "fa-brands fa-github fa-2x", url = "https://github.com/daniellmorris" },
   { icon = "fa-brands fa-linkedin fa-2x", url = "https://www.linkedin.com/in/daniellmorris/" },
   { icon = "fa-solid fa-envelope", url = "mailto:dan@daniellmorris.com" },
]

sections = ["about", "skills", "industries", "projects"]
